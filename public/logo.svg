  </defs>
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#mark)"/>
  <text x="114" y="44" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="3.5">BAVA<tspan fill="url(#nex)">NEX</tspan></text>
  <line x1="114" y1="54" x2="252" y2="54" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="114" y="74" fill="#FFFFFF" fill-opacity="0.5" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="3">TECHNOLOGIES</text>

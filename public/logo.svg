<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 260 100" fill="none">
  <defs>
    <linearGradient id="nex" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#4F8EF7"/>
    </linearGradient>
    <pattern id="mark" patternContentUnits="objectBoundingBox" width="1" height="1">
      <image href="/images/logo-mark.png" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>

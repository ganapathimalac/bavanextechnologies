name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: bavanex-technologies
  NODE_VERSION: "22.x"
  # GitHub Actions runner: checkout/setup-node use Node 24 (Node 20 deprecated on runners)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install & build
        env:
          NEXT_PUBLIC_SITE_URL: https://bavanextechnologies.com
        run: |
          npm ci
          npm run build

      - name: Prepare standalone package
        run: |
          cp -r .next/standalone deploy
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          node -e "
            const fs = require('fs');
            const pkgPath = 'deploy/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.scripts = pkg.scripts || {};
            pkg.scripts.start = 'HOSTNAME=0.0.0.0 node server.js';
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          "

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
